# Logrotate configuration for AInfluencer
# Place this file in /etc/logrotate.d/ainfluencer

/path/to/logs/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    create 0644 appuser appuser
    sharedscripts
    postrotate
        # Reload application if needed
        # systemctl reload ainfluencer || true
    endscript
}
