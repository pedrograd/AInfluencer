apiVersion: apps/v1
kind: Deployment
metadata:
  name: ainfluencer-backend
  labels:
    app: ainfluencer-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ainfluencer-backend
  template:
    metadata:
      labels:
        app: ainfluencer-backend
    spec:
      containers:
      - name: backend
        image: ainfluencer-backend:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: ainfluencer-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: ainfluencer-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: ainfluencer-secrets
              key: secret-key
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ainfluencer-web
  labels:
    app: ainfluencer-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ainfluencer-web
  template:
    metadata:
      labels:
        app: ainfluencer-web
    spec:
      containers:
      - name: web
        image: ainfluencer-web:latest
        ports:
        - containerPort: 3000
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://ainfluencer-backend:8000"
        resources:
          requests:
            memory: "1Gi"
            cpu: "0.5"
          limits:
            memory: "2Gi"
            cpu: "1"
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: ainfluencer-backend
spec:
  selector:
    app: ainfluencer-backend
  ports:
  - protocol: TCP
    port: 8000
    targetPort: 8000
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: ainfluencer-web
spec:
  selector:
    app: ainfluencer-web
  ports:
  - protocol: TCP
    port: 3000
    targetPort: 3000
  type: ClusterIP
